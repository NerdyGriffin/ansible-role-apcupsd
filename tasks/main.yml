---
# tasks file for nerdygriffin.apcupsd

- name: Install apcupsd
  ansible.builtin.package:
    name: "{{ apcupsd_packages }}"
    state: present

- name: Render apcupsd master configuration
  ansible.builtin.template:
    src: apcupsd.conf.j2
    dest: "{{ apcupsd_config_file }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart apcupsd

# Debian ships /etc/default/apcupsd with ISCONFIGURED=no, which makes the
# service refuse to start until the operator confirms the config. The template
# above is that confirmation, so flip the flag.
- name: Mark apcupsd as configured (Debian)
  ansible.builtin.lineinfile:
    path: /etc/default/apcupsd
    regexp: ^ISCONFIGURED=
    line: ISCONFIGURED=yes
  when: ansible_os_family == "Debian"
  notify: Restart apcupsd

- name: Enable and start apcupsd
  ansible.builtin.service:
    name: "{{ apcupsd_service }}"
    enabled: "{{ apcupsd_service_enabled }}"
    state: "{{ apcupsd_service_state }}"
